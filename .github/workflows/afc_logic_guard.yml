name: afc_logic_guard

on:
  push:
  pull_request:

jobs:
  afc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install guard deps (optional)
        run: |
          if [ -f tools/requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r tools/requirements.txt
          fi

      - name: Run AFC Logic Guard
        continue-on-error: true
        run: |
          mkdir -p reports
          python3 tools/afc_logic_guard.py --repo . --spec tools/spec_rules.json --out reports

      - name: Upload AFC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afc-logic-guard
          path: reports
