name: Agent Dispatcher
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed modules
        id: changes
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            const paths = files.data.map(f => f.filename);
            const agents = [];
            if (paths.some(p => p.includes('02_nodechain')))
              agents.push('AGENT-CHAIN');
            if (paths.some(p => p.includes('05_bridge')))
              agents.push('AGENT-BRIDGE');
            if (paths.some(p => p.includes('06_governance')))
              agents.push('AGENT-GOV');
            if (paths.some(p => p.includes('10_proof_of_transaction')))
              agents.push('AGENT-EMISSION');
            agents.push('AGENT-TEST-INT');
            core.setOutput('agents', agents.join(','));

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run assigned agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ASSIGNED_AGENTS: ${{ steps.changes.outputs.agents }}
        run: |
          echo "Запускаю агентов: $ASSIGNED_AGENTS"
          npm install -g @anthropic-ai/claude-code
          claude --print "
          Запущены агенты: $ASSIGNED_AGENTS
          PR содержит изменения в соответствующих модулях.
          Проверь изменения, запусти тесты, отчитайся.
          "
