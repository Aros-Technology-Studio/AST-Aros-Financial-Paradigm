name: AI Review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }} 
    steps:
      - uses: actions/checkout@v4
      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --unified=0 origin/${{ github.base_ref }}...HEAD | head -c 120000 > pr.diff

      - name: OpenAI comment
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        env: { OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} }
        run: |
          BODY=$(jq -n --arg t "$(sed 's/`/\\`/g' pr.diff)" \
            '{model:"gpt-4o-mini",messages:[{role:"user",content:"Review this diff:\n```diff\n"+$t+"\n```"}],temperature:0.2}')
          curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" -H "Content-Type: application/json" -d "$BODY" \
            | jq -r '.choices[0].message.content' > openai.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file openai.md

      - name: Grok comment
        if: ${{ secrets.GROK_API_KEY != '' }}
        env: { GROK_API_KEY: ${{ secrets.GROK_API_KEY }} }
        run: |
          BODY=$(jq -n --arg t "$(sed 's/`/\\`/g' pr.diff)" \
            '{model:"grok-2-latest",messages:[{role:"user",content:"Review this diff:\n```diff\n"+$t+"\n```"}],temperature:0.2}')
          curl -s https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $GROK_API_KEY" -H "Content-Type: application/json" -d "$BODY" \
            | jq -r '.choices[0].message.content' > grok.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file grok.md

      - name: Gemini comment
        if: ${{ secrets.GEMINI_API_KEY != '' }}
        env: { GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} }
        run: |
          BODY=$(jq -n --arg t "$(sed 's/`/\\`/g' pr.diff)" \
            '{contents:[{parts:[{text:"Review this diff:\n```diff\n"+$t+"\n```"}]}]}')
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" -d "$BODY" \
            | jq -r '.candidates[0].content.parts[0].text' > gemini.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file gemini.md
