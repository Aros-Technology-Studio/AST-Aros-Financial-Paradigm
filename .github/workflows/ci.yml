name: AST CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build NestJS
      run: npm run build

    - name: Run Tests
      run: npm test

    - name: Compile Contracts
      run: |
        cd smart_contracts
        npm install
        if [ -d "artifacts/contracts" ] && [ "$(ls -A artifacts/contracts)" ]; then
          echo "Pre-built artifacts found, skipping Solidity compiler download"
        else
          npx hardhat compile
        fi
