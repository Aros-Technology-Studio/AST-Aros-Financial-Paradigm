name: Nightly Audit
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run full test suite
        run: npm test -- --coverage

      - name: Claude Nightly Audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --print "
          Проведи полный ночной аудит репозитория:

          1. Найди все TODO, FIXME, mock, заглушки в коде
          2. Проверь все 14 модулей на completeness
          3. Найди модули без тестов или с coverage < 80%
          4. Проверь security: hardcoded secrets, sql injection risks
          5. Проверь архитектурные инварианты AFC:
             - Non-custodial соблюдается?
             - Role isolation не нарушена?
             - ArosCoin 1:1 emission правильно реализована?
          6. Создай файл reports/NIGHTLY_AUDIT_$(date +%Y%m%d).md
             с полным отчётом
          7. Если критические проблемы → создай GitHub Issue
          "

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-audit-report
          path: reports/
