name: Project Auto Sync

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: read
  projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_AST_CI }} # PAT с правами repo + project
      PROJECT_TITLE: AROS STUDIO TOKENOMICS PARADIGM
    steps:
      - name: Update Project (Status field)
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const action = context.payload.action;

            // Input Validation: Env vars
            const requiredEnv = ['GH_TOKEN', 'PROJECT_TITLE'];
            for (const e of requiredEnv) {
              if (!process.env[e]) {
                core.setFailed(`${e} environment variable not set`);
                return;
              }
            }
            const projectTitle = process.env.PROJECT_TITLE;

            // Input Validation: PR payload
            if (!pr) {
              core.setFailed('No PR payload in event');
              return;
            }
            if (!['opened', 'reopened', 'ready_for_review', 'closed'].includes(action)) {
              core.notice(`Unsupported PR action: ${action}. Skipping.`);
              return;
            }
            const merged = pr.merged;
            if (action === 'closed' && typeof merged !== 'boolean') {
              core.setFailed('Merged status missing or invalid for closed PR');
              return;
            }

            const prNodeId = pr.node_id;

            // Determine target status
            function targetFor(action, merged) {
              if (['opened', 'reopened', 'ready_for_review'].includes(action)) return 'Review';
              if (action === 'closed') return merged ? 'Done' : 'Rejected/Rework';
              return null;
            }
            const targetName = targetFor(action, merged);
            if (!targetName) {
              core.notice('No status update needed for this PR action');
              return;
            }

            try {
              // Get owner type
              const repoInfo = await github.rest.repos.get({ owner, repo });
              const ownerType = repoInfo.data.owner.type; // 'User' or 'Organization'
              if (!['User', 'Organization'].includes(ownerType)) {
                core.setFailed(`Invalid owner type: ${ownerType}`);
                return;
              }

              // Query to find project
              let query;
              if (ownerType === 'Organization') {
                query = `
                  query($owner: String!, $title: String!) {
                    organization(login: $owner) {
                      projectsV2(first: 50) {
                        nodes {
                          id
                          title
                          fields(first: 50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                __typename
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
              } else {
                query = `
                  query($title: String!) {
                    viewer {
                      projectsV2(first: 50) {
                        nodes {
                          id
                          title
                          fields(first: 50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                __typename
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
              }
              const variables = ownerType === 'Organization' ? { owner, title: projectTitle } : { title: projectTitle };
              const data = await github.graphql(query, variables);
              if (!data) {
                core.setFailed('GraphQL query returned no data');
                return;
              }
              const root = ownerType === 'Organization' ? data.organization : data.viewer;
              if (!root) {
                core.setFailed(`No ${ownerType.toLowerCase()} data in GraphQL response`);
                return;
              }
              const projects = root.projectsV2?.nodes || [];
              if (!Array.isArray(projects)) {
                core.setFailed('ProjectsV2 nodes not an array');
                return;
              }
              const project = projects.find(p => p.title === projectTitle);
              if (!project) {
                core.setFailed(`Project not found: "${projectTitle}"`);
                return;
              }
              const fieldsNodes = project.fields?.nodes || [];
              if (!Array.isArray(fieldsNodes)) {
                core.setFailed('Project fields nodes not an array');
                return;
              }
              const statusField = fieldsNodes.find(f => f?.name === 'Status');
              if (!statusField) {
                core.setFailed('Project field "Status" not found');
                return;
              }
              const options = statusField.options || [];
              if (!Array.isArray(options)) {
                core.setFailed('Status field options not an array');
                return;
              }
              const option = options.find(o => o.name === targetName);
              if (!option) {
                core.setFailed(`Status option not found: "${targetName}"`);
                return;
              }

              // Get itemId: check if PR already in project
              const prQuery = `
                query($prId: ID!) {
                  node(id: $prId) {
                    ... on PullRequest {
                      projectItems(first: 20) {
                        nodes {
                          id
                          project {
                            id
                            title
                          }
                        }
                      }
                    }
                  }
                }
              `;
              const prData = await github.graphql(prQuery, { prId: prNodeId });
              if (!prData || !prData.node) {
                core.setFailed('PR projectItems query returned no data');
                return;
              }
              const projectItems = prData.node.projectItems.nodes || [];
              if (!Array.isArray(projectItems)) {
                core.setFailed('Project items not an array');
                return;
              }
              let item = projectItems.find(pi => pi.project.id === project.id);
              let itemId;
              if (item) {
                itemId = item.id;
                core.notice('PR already in project');
              } else {
                // Add to project
                const addMutation = `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                      item {
                        id
                      }
                    }
                  }
                `;
                const addRes = await github.graphql(addMutation, { projectId: project.id, contentId: prNodeId });
                if (!addRes || !addRes.addProjectV2ItemById || !addRes.addProjectV2ItemById.item) {
                  core.setFailed('Failed to add PR to project');
                  return;
                }
                itemId = addRes.addProjectV2ItemById.item.id;
                core.notice('Added PR to project');
              }

              // Update status field
              const updateMutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `;
              const updateRes = await github.graphql(updateMutation, {
                projectId: project.id,
                itemId,
                fieldId: statusField.id,
                optionId: option.id
              });
              if (!updateRes || !updateRes.updateProjectV2ItemFieldValue) {
                core.setFailed('Failed to update project item field');
                return;
              }

              core.summary
                .addRaw(`PR #${pr.number} → Project "${projectTitle}", Status → ${targetName}`)
                .write();
              console.log(`Updated status to ${targetName}`);
            } catch (error) {
              core.setFailed(`Error: ${error.message}`);
            }
