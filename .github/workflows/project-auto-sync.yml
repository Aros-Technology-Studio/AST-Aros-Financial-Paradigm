---
name: Project Auto Sync

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PROJECT_TITLE: AROS STUDIO TOKENOMICS PARADIGM
    steps:
      - name: Sync PR → Project v2 (Status)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_AST_CI }}
          script: |
            const core = require('@actions/core');

            const action = context.payload.action;
            const pr = context.payload.pull_request;
            const prNodeId = pr.node_id;
            const merged = pr.merged || false;

            // 1) Найти твой Project v2 по названию
            const q1 = `
              query($n:Int!){
                viewer {
                  projectsV2(first:$n) {
                    nodes {
                      id
                      title
                      fields(first:50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }
              }`;
            const r1 = await github.graphql(q1, { n: 50 });

            const project = r1.viewer.projectsV2.nodes
              .find(p => p.title === process.env.PROJECT_TITLE);

            if (!project) {
              core.setFailed(`Project not found: ${process.env.PROJECT_TITLE}`);
              return;
            }

            const statusField = project.fields.nodes
              .find(f => f && f.name === 'Status');

            if (!statusField) {
              core.setFailed('Project field "Status" not found');
              return;
            }

            // 2) Определить целевую колонку
            let target = 'Review';
            if (action === 'closed') {
              target = merged ? 'Done' : 'Rejected/Rework';
            }

            const opt = statusField.options.find(o => o.name === target);
            if (!opt) {
              core.setFailed(`Status option not found: "${target}"`);
              return;
            }

            // 3) Добавить item (если его ещё нет) и выставить статус
            const addItemMutation = `
              mutation($projectId:ID!, $contentId:ID!){
                addProjectV2ItemById(
                  input:{ projectId:$projectId, contentId:$contentId }
                ){
                  item { id }
                }
              }`;
            const addRes = await github.graphql(addItemMutation, {
              projectId: project.id,
              contentId: prNodeId
            });
            const itemId = addRes.addProjectV2ItemById.item.id;

            const setStatusMutation = `
              mutation(
                $projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!
              ){
                updateProjectV2ItemFieldValue(
                  input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }
                ){
                  item { id }
                }
              }`;
            await github.graphql(setStatusMutation, {
              projectId: project.id,
              itemId,
              fieldId: statusField.id,
              optionId: opt.id
            });

            core.info(`PR moved to "${target}" in Project "${project.title}".`);
