name: Project Auto Sync

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: read
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # Убедитесь, что секрет PAT_AST_CI существует и имеет права repo + project
      GH_TOKEN: ${{ secrets.PAT_AST_CI }}
      PROJECT_TITLE: AROS STUDIO TOKENOMICS PARADIGM
    steps:
      - name: Update Project (Status field)
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('Could not get pull request from context.');
              return;
            }

            const projectTitle = process.env.PROJECT_TITLE;
            const prNodeId = pr.node_id;

            // --- Main Logic ---
            async function main() {
              const project = await findProject();
              if (!project) return;

              const statusField = project.fields.nodes.find(f => f.name === 'Status');
              if (!statusField) {
                core.setFailed('Project field "Status" not found.');
                return;
              }

              const targetStatusName = getTargetStatusName(context.payload.action, pr.merged);
              if (!targetStatusName) {
                core.notice('No project status update needed for this PR action.');
                return;
              }

              const targetOption = statusField.options.find(o => o.name === targetStatusName);
              if (!targetOption) {
                core.setFailed(`Status option "${targetStatusName}" not found in project.`);
                return;
              }

              const itemId = await findOrCreateProjectItem(project.id, prNodeId);
              if (!itemId) return;

              await updateItemStatus(project.id, itemId, statusField.id, targetOption.id);
              core.summary.addRaw(
                `PR #${pr.number} → Project "${projectTitle}", Status → ${targetStatusName}`
              ).write();
              console.log(`Updated status for PR #${pr.number} to ${targetStatusName}`);
            }

            // --- Functions ---
            async function findProject() {
              core.startGroup(`1) Finding project: "${projectTitle}"`);
              const { repository } = await github.graphql(`
                query($owner:String!, $repo:String!, $title:String!) {
                  repository(owner:$owner, name:$repo) {
                    projectsV2(first:20, query:$title) {
                      nodes {
                        id title
                        fields(first:50) {
                          nodes {
                            ... on ProjectV2SingleSelectField {
                              id name options { id name }
                            }
                          }
                        }
                      }
                    }
                  }
                }`, { owner, repo, title: projectTitle }
              );

              const project = repository.projectsV2.nodes.find(p => p.title === projectTitle);
              if (!project) {
                core.setFailed(`Project not found: "${projectTitle}"`);
                return null;
              }
              core.info(`Found project with ID: ${project.id}`);
              core.endGroup();
              return project;
            }

            function getTargetStatusName(action, merged) {
              if (['opened', 'reopened', 'ready_for_review'].includes(action)) return 'Review';
              if (action === 'closed') return merged ? 'Done' : 'Rejected/Rework';
              return null;
            }

            async function findOrCreateProjectItem(projectId, contentId) {
              core.startGroup(`2) Adding or finding PR in project`);
              try {
                // ИСПРАВЛЕНИЕ: Добавлен фрагмент "... on ProjectV2Item" для устранения ошибки GraphQL
                const { addProjectV2ItemById: { item } } = await github.graphql(`
                  mutation($projectId:ID!, $contentId:ID!) {
                    addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                      item {
                        ... on ProjectV2Item {
                          id
                        }
                      }
                    }
                  }`, { projectId, contentId }
                );
                core.info(`Added new item with ID: ${item.id}`);
                core.endGroup();
                return item.id;
              } catch (e) {
                core.warning(`Could not add PR to project (it might exist already). Searching for it...`);
                // If adding fails, it might already be there. Let's find it.
                const { node: project } = await github.graphql(`
                  query($projectId:ID!) {
                    node(id: $projectId) {
                      ... on ProjectV2 {
                        items(first: 100) {
                          nodes {
                            id
                            content {
                              ... on PullRequest { id }
                            }
                          }
                        }
                      }
                    }
                  }`, { projectId }
                );
                const projectItem = project.items.nodes.find(item => item.content && item.content.id === contentId);
                if (projectItem) {
                  core.info(`Found existing item with ID: ${projectItem.id}`);
                  core.endGroup();
                  return projectItem.id;
                } else {
                  core.setFailed(`Failed to add or find the PR in the project. Error: ${e.message}`);
                  core.endGroup();
                  return null;
                }
              }
            }

            async function updateItemStatus(projectId, itemId, fieldId, optionId) {
              core.startGroup(`3) Updating item status`);
              await github.graphql(`
                mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                  updateProjectV2ItemFieldValue(input:{
                    projectId:$projectId, itemId:$itemId, fieldId:$fieldId,
                    value:{ singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }`, { projectId, itemId, fieldId, optionId }
              );
              core.info(`Status updated for item ID: ${itemId}`);
              core.endGroup();
            }

            await main();


