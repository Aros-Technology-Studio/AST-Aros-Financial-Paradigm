---
name: Project Auto Sync

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  repository-projects: write

env:
  PROJECT_TITLE: AROS STUDIO TOKENOMICS PARADIGM

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_AST_CI }}
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const title = process.env.PROJECT_TITLE;

            // pick target column by PR event
            let target = 'ToDo';
            if (['opened','reopened','ready_for_review'].includes(context.payload.action)) target = 'Review';
            if (context.payload.action === 'closed') {
              target = context.payload.pull_request.merged ? 'Done' : 'Rejected/Rework';
            }

            // find project
            const repoQ = `query($owner:String!,$repo:String!){
              repository(owner:$owner,name:$repo){
                projectsV2(first:50){ nodes{ id title fields(first:50){
                  nodes{ id name __typename ... on ProjectV2SingleSelectField { options{ id name } } }
                } } }
              }
            }`;
            const pr = await github.graphql(repoQ,{owner,repo});
            const project = pr.repository.projectsV2.nodes.find(p=>p.title===title);
            if (!project) return core.warning('Project not found — skipping.');

            const status = project.fields.nodes.find(f=>f.name==='Status' && f.__typename==='ProjectV2SingleSelectField');
            if (!status) return core.warning('Status field missing — skipping.');

            const opt = (status.options||[]).find(o=>o.name===target);
            if (!opt) return core.warning(`Option "${target}" not found — skipping.`);

            // ensure PR item exists in project
            const nodeIdQ = `query($owner:String!,$repo:String!,$num:Int!){
              repository(owner:$owner,name:$repo){ pullRequest(number:$num){ id } }
            }`;
            const prId = (await github.graphql(nodeIdQ,{owner,repo,num:context.payload.pull_request.number})).repository.pullRequest.id;

            // add item if needed
            const itemsQ = `query($pid:ID!,$id:ID!){
              node(id:$pid){ ... on ProjectV2 { items(first:100, query:""){ nodes{ id content{ ... on PullRequest { id } } } } } }
            }`;
            const items = (await github.graphql(itemsQ,{pid:project.id,id:prId})).node.items.nodes;
            let item = items.find(it => it.content?.id === prId);

            if (!item) {
              const addM = `mutation($pid:ID!,$cid:ID!){
                addProjectV2ItemById(input:{projectId:$pid, contentId:$cid}){ item { id } }
              }`;
              item = (await github.graphql(addM,{pid:project.id,cid:prId})).addProjectV2ItemById.item;
            }

            // set Status value
            const setM = `mutation($pid:ID!,$iid:ID!,$fid:ID!,$opt: String!){
              updateProjectV2ItemFieldValue(input:{
                projectId:$pid, itemId:$iid, fieldId:$fid,
                value:{ singleSelectOptionId:$opt }
              }){ projectV2Item { id } }
            }`;
            await github.graphql(setM,{pid:project.id,iid:item.id,fid:status.id,opt:opt.id});
            core.notice(`PR moved to "${target}"`);
