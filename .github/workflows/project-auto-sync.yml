---
name: Project Auto Sync

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: read
  projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PROJECT_TITLE: AROS STUDIO TOKENOMICS PARADIGM
    steps:
      - name: Sync PR → Project v2 (Status)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_AST_CI }}
          script: |
            const core = require('@actions/core');

            const action = context.payload.action;
            const pr = context.payload.pull_request;
            const prNodeId = pr.node_id;
            const merged = pr.merged || false;

            // 1) Найти твой Project v2 по названию
            const q1 = `
              query($n:Int!){
                viewer {
                  projectsV2(first:$n) {
                    nodes {
                      id
                      title
                      fields(first:50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }
              }`;
            const r1 = await github.graphql(q1, { n: 50 });

            const project = r1.viewer.projectsV2.nodes
              .find(p => p.title === process.env.PROJECT_TITLE);

            if (!project) {
              core.setFailed(`Project not found: ${process.env.PROJECT_TITLE}`);
              return;
            }

            const statusField = project.fields.nodes
              .find(f => f && f.name === 'Status');

            if (!statusField) {
              core.setFailed('Project field "Status" not found');
              return;
            }

            // 2) Определить целевую колонку
            let target = 'Review';
            if (action === 'closed') {
              target = merged ? 'Done' : 'Rejected/Rework';
            }

              // Query to find project
              let query;
              if (ownerType === 'Organization') {
                query = `
                  query($owner: String!, $title: String!) {
                    organization(login: $owner) {
                      projectsV2(first: 50) {
                        nodes {
                          id
                          title
                          fields(first: 50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                __typename
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
              } else {
                query = `
                  query {
                    viewer {
                      projectsV2(first: 50) {
                        nodes {
                          id
                          title
                          fields(first: 50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                __typename
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
              }
              const variables = ownerType === 'Organization' ? { owner, title: projectTitle } : {};
              const data = await github.graphql(query, variables);
              if (!data) {
                core.setFailed('GraphQL query returned no data');
                return;
              }
              const root = ownerType === 'Organization' ? data.organization : data.viewer;
              if (!root) {
                core.setFailed(`No ${ownerType.toLowerCase()} data in GraphQL response`);
                return;
              }
              const projects = root.projectsV2?.nodes || [];
              if (!Array.isArray(projects)) {
                core.setFailed('ProjectsV2 nodes not an array');
                return;
              }
              const project = projects.find(p => p.title === projectTitle);
              if (!project) {
                core.setFailed(`Project not found: "${projectTitle}"`);
                return;
              }
              const fieldsNodes = project.fields?.nodes || [];
              if (!Array.isArray(fieldsNodes)) {
                core.setFailed('Project fields nodes not an array');
                return;
              }
              const statusField = fieldsNodes.find(f => f?.name === 'Status');
              if (!statusField) {
                core.setFailed('Project field "Status" not found');
                return;
              }
              const options = statusField.options || [];
              if (!Array.isArray(options)) {
                core.setFailed('Status field options not an array');
                return;
              }
              const option = options.find(o => o.name === targetName);
              if (!option) {
                core.setFailed(`Status option not found: "${targetName}"`);
                return;
              }
            const opt = statusField.options.find(o => o.name === target);
            if (!opt) {
              core.setFailed(`Status option not found: "${target}"`);
              return;
            }

            // 3) Добавить item (если его ещё нет) и выставить статус
            const addItemMutation = `
              mutation($projectId:ID!, $contentId:ID!){
                addProjectV2ItemById(
                  input:{ projectId:$projectId, contentId:$contentId }
                ){
                  item { id }
                }
              }`;
            const addRes = await github.graphql(addItemMutation, {
              projectId: project.id,
              contentId: prNodeId
            });
            const itemId = addRes.addProjectV2ItemById.item.id;

            const setStatusMutation = `
              mutation(
                $projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!
              ){
                updateProjectV2ItemFieldValue(
                  input:{
                    projectId:$projectId,
                    itemId:$itemId,
                    fieldId:$fieldId,
                    value:{ singleSelectOptionId:$optionId }
                  }
                ){
                  item { id }
                }
              }`;
            await github.graphql(setStatusMutation, {
              projectId: project.id,
              itemId,
              fieldId: statusField.id,
              optionId: opt.id
            });

            core.info(`PR moved to "${target}" in Project "${project.title}".`);
