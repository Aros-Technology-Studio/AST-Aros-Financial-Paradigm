name: Project Auto Sync

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: read
  projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_AST_CI }}
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const projectTitle = 'AROS STUDIO TOKENOMICS PARADIGM';
            const pr = context.payload.pull_request;
            const contentId = pr.node_id;

            // проект
            const viewer = await github.graphql(`query{
              viewer { projectsV2(first:50){nodes{id title fields(first:50){
                nodes{ ... on ProjectV2SingleSelectField { id name options{ id name } } }
              }}}
            }`);
            const project = viewer.viewer.projectsV2.nodes.find(p=>p.title===projectTitle);
            if (!project) return core.warning('Project not found.');

            // поле Status
            const status = project.fields.nodes.find(f=>f && f.name==='Status');
            const getOpt = name => (status.options.find(o=>o.name===name) || status.options[0]).id;

            // цель статуса
            let target = 'ToDo';
            if (['opened','reopened','ready_for_review'].includes(context.payload.action)) target = 'Review';
            if (context.payload.action==='closed' && pr.merged) target = 'Done';
            const optId = getOpt(target);

            // добавить item (если нет) и обновить статус
            const add = await github.graphql(`
              mutation($projectId:ID!, $contentId:ID!){
                addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}){
                  item { id }
                }
              }`, { projectId: project.id, contentId }
            ).catch(_=>null);

            const itemId = add?.addProjectV2ItemById?.item?.id;
            if (!itemId) return; // возможно уже есть; тихо выходим

            await github.graphql(`
              mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!){
                updateProjectV2ItemFieldValue(input:{
                  projectId:$projectId, itemId:$itemId, fieldId:$fieldId,
                  value:{ singleSelectOptionId:$optionId }
                }) { projectV2Item { id } }
              }`,
              { projectId: project.id, itemId, fieldId: status.id, optionId: optId }
            );
