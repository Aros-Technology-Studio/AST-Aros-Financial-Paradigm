name: Project Auto Sync

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: read
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PAT_AST_CI }} # PAT с правами repo + project
      PROJECT_TITLE: AROS STUDIO TOKENOMICS PARADIGM
    steps:
      - name: Update Project (Status field)
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.GH_TOKEN }}
          script: |
            const core = require('@actions/core');
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const pr    = context.payload.pull_request;
            if (!pr) { core.setFailed('No PR payload'); return; }

            const projectTitle = process.env.PROJECT_TITLE;
            const prNodeId = pr.node_id;

            // 1) Найти проект репозитория и поле "Status"
            const query = `
              query($owner:String!, $repo:String!, $title:String!) {
                repository(owner:$owner, name:$repo) {
                  projectsV2(first:50, query:$title) {
                    nodes {
                      id
                      title
                      fields(first:50) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            __typename
                            id
                            name
                            options { id name }
                          }
                        }
                      }
                    }
                  }
                }
              }`;
            const data = await github.graphql(query, { owner, repo, title: projectTitle });

            const projects = data.repository?.projectsV2?.nodes || [];
            const project  = projects.find(p => p.title === projectTitle);
            if (!project) { core.setFailed(`Project not found: "${projectTitle}"`); return; }

            const statusField = (project.fields?.nodes || []).find(f => f?.name === 'Status');
            if (!statusField) { core.setFailed('Project field "Status" not found'); return; }

            // 2) Определить целевой статус по событию
            function targetFor(action, merged) {
              if (['opened','reopened','ready_for_review'].includes(action)) return 'Review';
              if (action === 'closed') return merged ? 'Done' : 'Rejected/Rework';
              return null;
            }
            const targetName = targetFor(context.payload.action, pr.merged);
            if (!targetName) { core.notice('No move needed for this PR action'); return; }

            const option = statusField.options.find(o => o.name === targetName);
            if (!option) { core.setFailed(`Status option not found: "${targetName}"`); return; }

            // 3) Добавить PR в проект (id item'а)
            // Примечание: если PR уже в проекте, этот шаг вызовет ошибку, и статус не обновится.
            // Для более надежной работы можно сначала искать item и только потом добавлять.
            const addRes = await github.graphql(
              `mutation($projectId:ID!, $contentId:ID!) {
                 addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}) {
                   item { id }
                 }
               }`,
              { projectId: project.id, contentId: prNodeId }
            ).catch(err => {
              core.warning(`Could not add PR to project (it might already be there): ${err.message}`);
              return null;
            });

            if (!addRes || !addRes.addProjectV2ItemById || !addRes.addProjectV2ItemById.item) {
              core.setFailed('Failed to add or find PR in the project.');
              return;
            }
            const itemId = addRes.addProjectV2ItemById.item.id;


            // 4) Проставить значение поля "Status"
            await github.graphql(
              `mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                 updateProjectV2ItemFieldValue(input:{
                   projectId:$projectId,
                   itemId:$itemId,
                   fieldId:$fieldId,
                   value:{ singleSelectOptionId:$optionId }
                 }) {
                   projectV2Item { id }
                 }
               }`,
              { projectId: project.id, itemId, fieldId: statusField.id, optionId: option.id }
            );

            core.summary.addRaw(
              `PR #${pr.number} → Project "${projectTitle}", Status → ${targetName}`
            ).write();
            console.log(`Updated status to ${targetName}`);

