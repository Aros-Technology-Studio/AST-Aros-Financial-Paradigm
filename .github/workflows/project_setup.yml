name: Project Setup (Codex)

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'GitHub Project V2 title'
        required: true
        default: 'AROS STUDIO TOKENOMICS PARADIGM'
      columns_csv:
        description: 'Status options (Project V2) CSV'
        required: true
        default: 'No Status,ToDo,Draft,Review,Rejected/Rework,Approved,Done'
      create_milestones:
        description: 'Create 16 milestones (Setup + 14 modules + Launch)'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  repository-projects: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run project bootstrap
        uses: actions/github-script@v7
        with:
          # Передаем токен напрямую из секретов.
          # Это самый надежный способ.
          github-token: ${{ secrets.PAT_AST_CI }}
          script: |
            const { owner, repo } = context.repo;

            // --- Helpers ---
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const upsertLabel = (name, color, description = '') => {
              return github.rest.issues.createLabel({ owner, repo, name, color, description }).catch(e => {
                if (e.status !== 422) throw e; // 422 means it already exists
              });
            };
            const ensureMilestone = (title, description = '') => {
              return github.rest.issues.createMilestone({ owner, repo, title, description }).catch(e => {
                if (e.status !== 422) throw e;
              });
            };

            // --- Main Logic ---
            async function main() {
              const projectName = core.getInput('project_name', { required: true });
              const desiredStatuses = core.getInput('columns_csv').split(',').map(s => s.trim()).filter(Boolean);

              const { repositoryOwner } = await github.graphql(`
                query($owner:String!) { repositoryOwner(login:$owner){ id } }`, { owner }
              );
              const ownerId = repositoryOwner.id;

              const project = await findOrCreateProject(ownerId, projectName);
              await ensureStatusField(project.id, desiredStatuses);
              await createLabels();
              if (core.getBooleanInput('create_milestones')) {
                await createMilestones();
              }
              await linkIssuesToProject(project.id);

              core.notice('Project bootstrap finished.');
              core.setOutput('project_url', project.url);
            }

            // --- Functions ---
            async function findOrCreateProject(ownerId, projectName) {
              core.startGroup(`1) Find or Create Project: "${projectName}"`);
              const data = await github.graphql(`
                query($owner:String!, $projectName:String!) {
                  repositoryOwner(login: $owner) {
                    projectsV2(first: 50, query: $projectName) {
                      nodes { id title url }
                    }
                  }
                }`, { owner, projectName });

              let project = data.repositoryOwner.projectsV2.nodes.find(p => p.title === projectName);

              if (!project) {
                core.info(`Project not found. Creating...`);
                const creationResult = await github.graphql(`
                  mutation($ownerId:ID!, $title:String!){
                    createProjectV2(input:{ownerId:$ownerId, title:$title}) {
                      projectV2 { id title url }
                    }
                  }`, { ownerId, title: projectName });
                project = creationResult.createProjectV2.projectV2;
                core.info(`Created Project: ${project.title} -> ${project.url}`);
              } else {
                core.info(`Using existing Project: ${project.title} -> ${project.url}`);
              }
              core.endGroup();
              return project;
            }

            async function ensureStatusField(projectId, desiredStatuses) {
              core.startGroup('2) Ensure "Status" field with desired options');
              const { node: project } = await github.graphql(`
                query($id:ID!){
                  node(id:$id){ ... on ProjectV2 {
                    fields(first:50){ nodes {
                      ... on ProjectV2SingleSelectField { id name options { id name } }
                    }}
                  }}
                }`, { id: projectId });

              let statusField = project.fields.nodes.find(f => f.name === 'Status' && f.options);

              if (!statusField) {
                core.info('Status field not found. Creating...');
                const result = await github.graphql(`
                  mutation($projectId:ID!) {
                    createProjectV2Field(input:{projectId:$projectId, dataType:SINGLE_SELECT, name:"Status"}) {
                      projectV2Field { ... on ProjectV2SingleSelectField { id name options {id name} } }
                    }
                  }`, { projectId });
                statusField = result.createProjectV2Field.projectV2Field;
              }

              const existingOptions = new Set(statusField.options.map(o => o.name));
              const optionsToAdd = desiredStatuses.filter(d => !existingOptions.has(d));

              if (optionsToAdd.length > 0) {
                core.info(`Adding new status options: ${optionsToAdd.join(', ')}`);
                const finalOptions = desiredStatuses.map(name => ({ name }));
                await github.graphql(`
                  mutation($projectId:ID!, $fieldId:ID!, $options:[ProjectV2SingleSelectFieldOptionInput!]!) {
                    updateProjectV2Field(input:{
                      projectId:$projectId, fieldId:$fieldId, singleSelectOptions: $options
                    }){ projectV2Field { ... on ProjectV2SingleSelectField { id } } }
                  }`, { projectId, fieldId: statusField.id, options: finalOptions });
              } else {
                core.info('All desired status options already exist.');
              }
              core.endGroup();
            }

            async function createLabels() {
              core.startGroup('3) Create Labels');
              const coreLabels = [
                upsertLabel('AI-generated', '5319e7', 'Produced by AI agent'),
                upsertLabel('needs-review', 'd93f0b', 'Human review required'),
                upsertLabel('documentation', '0075ca', 'Docs work'),
                upsertLabel('planning', '0366d6', 'Planning/PM'),
                upsertLabel('devops', 'a2eeef', 'DevOps/CI/CD'),
                upsertLabel('automation', 'c2e0c6', 'Automation tasks'),
              ];
              for (let i = 1; i <= 14; i++) {
                const name = `module-${String(i).padStart(2, '0')}`;
                coreLabels.push(upsertLabel(name, 'ededed', `Module ${name}`));
              }
              await Promise.all(coreLabels);
              core.info('Core and module labels ensured.');
              core.endGroup();
            }

            async function createMilestones() {
              core.startGroup('4) Create Milestones');
              const titles = [
                'Milestone 1: Setup & Automation', 'Module 01: Coin Engine', 'Module 02: NodeChain Engine',
                'Module 03: Token Management', 'Module 04: Value Circulation', 'Module 05: Bridge Layer',
                'Module 06: Governance Layer', 'Module 07: Processing Layer', 'Module 08: Emission Layer',
                'Module 09: Crypto Ingestion', 'Module 10: PoT Engine', 'Module 11: Validator Rewards',
                'Module 12: NodeChain AI Agents', 'Module 13: Supervisory Layer', 'Module 14: Decentralized TX Encoding',
                'Launch & Support'
              ];
              await Promise.all(titles.map(t => ensureMilestone(t)));
              core.info(`${titles.length} milestones ensured.`);
              core.endGroup();
            }

            async function linkIssuesToProject(projectId) {
              core.startGroup('5) Link existing issues to Project');
              const { node: projectData } = await github.graphql(`
                query($id:ID!){
                  node(id:$id){ ... on ProjectV2 {
                    fields(first:20){ nodes {
                      ... on ProjectV2SingleSelectField {
                        name, id, options { id, name }
                      }
                    }}
                  }}
                }`, { id: projectId });
              const statusField = projectData.fields.nodes.find(f => f.name === 'Status');
              const todoOption = statusField.options.find(o => o.name === 'ToDo') || statusField.options[0];

              if (!todoOption) {
                core.warning('Could not find a "ToDo" status option. Skipping issue status update.');
                return;
              }

              const issues = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'open' });
              for (const issue of issues) {
                if (issue.pull_request) continue; // Skip PRs
                try {
                  const { addProjectV2ItemById: { item } } = await github.graphql(`
                    mutation($projectId:ID!, $contentId:ID!) {
                      addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}){ item { id } }
                    }`, { projectId, contentId: issue.node_id });

                  await github.graphql(`
                    mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!) {
                      updateProjectV2ItemFieldValue(input:{
                        projectId:$projectId, itemId:$itemId, fieldId:$fieldId, value:{ singleSelectOptionId:$optionId }
                      }) { projectV2Item { id } }
                    }`, { projectId, itemId: item.id, fieldId: statusField.id, optionId: todoOption.id });
                  core.info(`Linked Issue #${issue.number} to project and set status to ToDo.`);
                  await sleep(200);
                } catch (e) {
                  core.warning(`Could not link Issue #${issue.number}. It might already be in the project. Error: ${e.message}`);
                }
              }
              core.endGroup();
            }

            await main();

      - name: Protect main branch (require PR + checks)
        if: success()
        env:
          # Используем отдельную переменную для PAT, чтобы избежать конфликтов.
          ADMIN_PAT: ${{ secrets.PAT_AST_CI }}
        run: |
          set -e
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          JSON_PAYLOAD=$(cat <<EOF
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["run-lint", "review"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false
          }
          EOF
          )
          # Используем ADMIN_PAT
          curl -sS --fail -X PUT \
            -H "Authorization: token ${ADMIN_PAT}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/branches/main/protection" \
            -d "${JSON_PAYLOAD}"
          echo "Main branch protection rules applied."

